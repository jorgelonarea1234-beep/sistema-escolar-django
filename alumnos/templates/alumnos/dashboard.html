{% extends 'base.html' %}

{% block content %}

<div class="container">

    <!-- 🔥 TÍTULO -->
    <h3 class="fw-semibold mb-4">
        📊 Dashboard
    </h3>

    <!-- 🔹 CARDS -->
    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card p-3 shadow-sm text-center">
                <small class="text-muted">Total Alumnos</small>
                <h2 class="fw-bold">{{ total_alumnos }}</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow-sm text-center">
                <small class="text-muted">Total Carreras</small>
                <h2 class="fw-bold">{{ total_carreras }}</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow-sm text-center">
                <small class="text-muted">Promedio General</small>

                {% if promedio_general %}
                <h2 class="fw-bold">
                    {{ promedio_general|floatformat:2 }}
                </h2>
                {% else %}
                <h5 class="text-muted">Sin datos</h5>
                {% endif %}

            </div>
        </div>

    </div>

    <!-- 🔹 GRÁFICA -->
    <div class="card p-4 shadow-sm">

        <h5 class="mb-3">Alumnos por carrera</h5>

        <canvas id="grafica"></canvas>

    </div>

</div>

<!-- 🔥 CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('grafica');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: {{ labels|safe }},
        datasets: [{
            label: 'Alumnos',
            data: {{ data|safe }},
            borderWidth: 1
        }]
    }
});
</script>

{% endblock %}
