{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-success text-white">

        <h2>Crear Alumno</h2>

    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit"
                    class="btn btn-success">

                Guardar

            </button>

            <a href="/alumnos/"
               class="btn btn-secondary">

                Volver

            </a>

        </form>

    </div>

</div>

{% endblock %}
