{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">
        <h4>Carreras</h4>

        <a href="{% url 'crear_carrera' %}" class="btn btn-dark">
            Nueva Carrera
        </a>
    </div>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            {% for carrera in carreras %}
            <tr>
                <td>{{ carrera.nombre }}</td>
                <td>
                    <a href="{% url 'asignar_materias_carrera' carrera.id %}" class="btn btn-sm btn-dark">
                        Materias
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
