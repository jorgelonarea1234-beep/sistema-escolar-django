{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-success text-white">

        <h2>Importar Excel</h2>

    </div>

    <div class="card-body">

        <form method="POST"
              enctype="multipart/form-data">

            {% csrf_token %}

            <input type="file"
                   name="archivo"
                   class="form-control mb-3">

            <button type="submit"
                    class="btn btn-success">

                Importar

            </button>

        </form>

    </div>

</div>

{% endblock %}
