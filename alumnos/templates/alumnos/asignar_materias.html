{% extends 'base.html' %}

{% block content %}

<div class="card p-4 shadow-sm" style="max-width: 600px; margin:auto;">

    <h4 class="mb-3 text-center">
        Asignar materias a {{ carrera.nombre }}
    </h4>

    <form method="POST">
        {% csrf_token %}

        {% for materia in materias %}
            <div class="form-check">
                <input class="form-check-input" type="checkbox"
                       name="materias"
                       value="{{ materia.id }}"
                       {% if materia in materias_asignadas %}checked{% endif %}>

                <label class="form-check-label">
                    {{ materia.nombre }}
                </label>
            </div>
        {% endfor %}

        <button class="btn btn-dark w-100 mt-3">
            Guardar
        </button>
    </form>

</div>

{% endblock %}
